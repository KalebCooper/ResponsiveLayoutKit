name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN plus the scopes deploy-pages needs to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages publish in flight at a time; never cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC site
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Show Xcode version
        run: xcodebuild -version

      # Mirrors ci.yml's docbuild job (same scheme + iOS-sim destination) so the
      # archive comes from the known warning-clean build. -derivedDataPath is the
      # one addition: it pins where the .doccarchive lands for the next step.
      - name: Build documentation archive
        run: |
          set -o pipefail
          xcodebuild docbuild \
            -scheme ResponsiveLayoutKit \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            -derivedDataPath .derivedData \
            -skipPackagePluginValidation \
            | xcbeautify --renderer github-actions

      # Rewrite the archive for static hosting under the Pages sub-path
      # (site serves from https://<owner>.github.io/ResponsiveLayoutKit/).
      - name: Transform for static hosting
        run: |
          set -euo pipefail
          archive="$(find .derivedData -type d -name 'ResponsiveLayoutKit.doccarchive' | head -1)"
          "$(xcrun --find docc)" process-archive transform-for-static-hosting \
            "$archive" \
            --output-path _site \
            --hosting-base-path ResponsiveLayoutKit

      # DocC's static-hosting output has no landing page at the site root: the
      # bare index.html is an app shell that keeps baseUrl "/" (so its assets
      # 404 under the Pages sub-path) and has no route to render. Replace it with
      # a redirect into the single documentation route so the bare URL works.
      - name: Write root redirect
        run: |
          set -euo pipefail
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=documentation/responsivelayoutkit/">
              <link rel="canonical" href="https://kalebcooper.github.io/ResponsiveLayoutKit/documentation/responsivelayoutkit/">
              <title>ResponsiveLayoutKit</title>
            </head>
            <body>
              <p>Redirecting to the <a href="documentation/responsivelayoutkit/">ResponsiveLayoutKit documentation</a>…</p>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
